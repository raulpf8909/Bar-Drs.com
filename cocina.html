    <!-- Custom CSS Styles -->
    <style>
        body {
            background-color: #f2f0ea;
            color: #00272d;
            font-family: 'Merriweather', serif;
            min-height: max(884px, 100dvh);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }

        /* Kitchen Menu Styles */
        .hairline-border {
            border: 0.5px solid #00272d;
        }

        .double-border {
            border: 1px solid #00272d;
            outline: 2px solid #00272d;
            outline-offset: 4px;
        }

        .engraving-line {
            height: 1px;
            background: linear-gradient(to right, transparent, #00272d, transparent);
        }

        .vignette-card {
            position: relative;
            overflow: hidden;
        }

        /* Deco Border (Cocina Page) */
        .deco-border {
            border: 0.5px solid #70787a;
            position: relative;
        }

        .deco-border::before,
        .deco-border::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border: 1px solid #00272d;
            transform: rotate(45deg);
        }

        .deco-border::before {
            top: -4px;
            left: -4px;
        }

        .deco-border::after {
            bottom: -4px;
            right: -4px;
        }

        .vintage-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, #00272d, transparent);
            width: 100%;
            margin: 1rem 0;
        }

        .art-deco-pattern {
            background-color: #f2f0ea;
            background-image: radial-gradient(#c0c8ca 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }

        /* Circular product images */
        .tarjeta-producto-tacos {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #b7976e;
        }

        @media (min-width: 768px) {
            .tarjeta-producto-tacos {
                width: 440px;
                height: 440px;
            }
        }

        /* Vintage Border (Bebidas Page) */
        .vintage-border {
            border: 0.5px solid #00272d;
            position: relative;
            transition: border-color 0.3s ease;
        }

        .vintage-border::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            border: 0.5px solid #00272d;
            pointer-events: none;
        }

        .etched-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, #00272d 20%, #00272d 80%, transparent);
            width: 100%;
            margin: 1.5rem 0;
        }

        .scalloped-badge {
            clip-path: polygon(100% 50%, 98% 57%, 93% 63%, 86% 67%, 80% 70%, 73% 73%, 67% 76%, 60% 78%, 53% 79%, 47% 79%, 40% 78%, 33% 76%, 27% 73%, 20% 70%, 14% 67%, 7% 63%, 2% 57%, 0% 50%, 2% 43%, 7% 37%, 14% 33%, 20% 30%, 27% 27%, 33% 24%, 40% 22%, 47% 21%, 53% 21%, 60% 22%, 67% 24%, 73% 27%, 80% 30%, 86% 33%, 93% 37%, 98% 43%);
        }

        /* Art Deco Border (Cocteles Page) */
        .art-deco-border {
            border: 0.5px solid #00272d;
            padding: 2px;
            position: relative;
        }

        .art-deco-border::after {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border: 0.5px solid #00272d;
            pointer-events: none;
        }

        .vintage-divider {
            display: flex;
            align-items: center;
            text-align: center;
        }

        .vintage-divider::before,
        .vintage-divider::after {
            content: '';
            flex: 1;
            border-bottom: 0.5px solid #00272d;
        }

        .vintage-divider:not(:empty)::before {
            margin-right: 1rem;
        }

        .vintage-divider:not(:empty)::after {
            margin-left: 1rem;
        }

        /* Hide scrollbars but keep scrolling functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

    <script>
        // Global button scale-down micro-interaction on press
        document.querySelectorAll('button, a:not(.logo-link)').forEach(el => {
            el.addEventListener('mousedown', () => {
                el.style.transform = 'scale(0.97)';
                el.style.transition = 'transform 0.1s ease';
            });
            el.addEventListener('mouseup', () => {
                el.style.transform = '';
            });
            el.addEventListener('mouseleave', () => {
                el.style.transform = '';
            });
        });

    </script>

    <script type="module">
        async function fetchProducts(category) {
            const all = JSON.parse(document.getElementById('products-data').textContent);
            return all.filter(p => p.category === category).sort((a, b) => (a.order || 0) - (b.order || 0));
        }

        // Modal handling
        const modal = document.getElementById('product-modal');
        const closeBtn = document.getElementById('modal-close');
        const modalImg = document.getElementById('modal-image');
        const modalTitle = document.getElementById('modal-title');
        const modalPrice = document.getElementById('modal-price');
        const modalDesc = document.getElementById('modal-description');

        if (closeBtn) closeBtn.addEventListener('click', () => modal.classList.add('hidden'));
        if (modal) modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.add('hidden'); });

        const container = document.getElementById('dynamic-content-container');

        async function loadCocinaProducts() {
            try {
                const products = await fetchProducts("cocina");

                const productsBySubcategory = {};
                products.forEach(product => {
                    if (product.order === undefined) product.order = 0;
                    const sub = product.subcategory || 'Otros';
                    if (!productsBySubcategory[sub]) productsBySubcategory[sub] = [];
                    productsBySubcategory[sub].push(product);
                });

                for (const key of Object.keys(productsBySubcategory)) {
                    productsBySubcategory[key].sort((a, b) => (a.order || 0) - (b.order || 0));
                }

                if (Object.keys(productsBySubcategory).length === 0) {
                    container.innerHTML = '<p class="text-center py-10 text-on-surface-variant">El menú de cocina se está preparando...</p>';
                    return;
                }

                container.innerHTML = ''; // Clear loading

                const subcategoryOrder = { 'comida': 0, 'postres': 1 };
                const sortedEntries = Object.entries(productsBySubcategory).sort((a, b) => {
                    return (subcategoryOrder[a[0].toLowerCase()] ?? 99) - (subcategoryOrder[b[0].toLowerCase()] ?? 99);
                });

                for (const [subcategory, products] of sortedEntries) {
                    // Capitalize subcategory
                    const subTitle = subcategory.charAt(0).toUpperCase() + subcategory.slice(1);

                    // Header
                    const headerHtml = `
                        <div class="flex items-center gap-4 mt-10 mb-10">
                            <div class="flex-1 engraving-line"></div>
                            <h2 class="font-headline-md text-headline-md text-primary italic px-4 text-center">${subTitle}</h2>
                            <div class="flex-1 engraving-line"></div>
                        </div>
                    `;

                    // Products Section
                    let productsHtml = '<section class="space-y-12">';
                    products.forEach(product => {
                        productsHtml += `
                            <div class="group flex flex-col md:flex-row gap-8 items-start cursor-pointer product-card" 
                                data-title="${product.name}" 
                                data-price="${product.price != null && !isNaN(product.price) ? '$' + parseFloat(product.price).toFixed(2) : ''}" 
                                data-desc="${product.description}" 
                                data-img="${product.imageUrl || ''}">
                                
                                <div class="tarjeta-producto-tacos shrink-0 self-center md:self-start mb-2">
                                    <img alt="${product.name}" class="w-full h-full object-cover" src="${product.imageUrl || ''}" onerror="this.style.display='none'" loading="lazy" />
                                </div>
                                <div class="flex-grow">
                                    <div class="flex justify-between items-baseline mb-0">
                                        <h3 class="font-headline-sm text-headline-sm text-primary">${product.name}</h3>
                                        ${product.price != null && !isNaN(product.price) ? '<span class="font-label-md text-label-md text-secondary">$' + parseFloat(product.price).toFixed(2) + '</span>' : ''}
                                    </div>
                                    <p class="font-body-md text-body-md text-on-surface-variant leading-relaxed italic mb-4 whitespace-pre-line">
                                    ${product.description}
                                    </p>

                                </div>
                            </div>
                        `;
                    });
                    productsHtml += '</section>';

                    container.innerHTML += headerHtml + productsHtml;
                }

                // Re-attach modal listeners
                document.querySelectorAll('.product-card').forEach(card => {
                    card.addEventListener('click', () => {
                        modalImg.src = card.dataset.img;
                        modalImg.alt = card.dataset.title;
                        modalTitle.textContent = card.dataset.title;
                        modalPrice.textContent = card.dataset.price;
                        modalDesc.textContent = card.dataset.desc;
                        modal.classList.remove('hidden');
                        modal.classList.add('flex');
                    });

                    // Micro-interactions
                    card.addEventListener('mouseenter', () => {
                        card.style.transform = 'translateY(-2px)';
                        card.style.transition = 'transform 0.3s ease';
                    });
                    card.addEventListener('mouseleave', () => {
                        card.style.transform = 'translateY(0)';
                    });
                });

            } catch (error) {
                console.error("Error loading products:", error);
                container.innerHTML = '<p class="text-error text-center py-10">Error al cargar el menú. Revisa tu conexión o configuración de Firebase.</p>';
            }
        }

        loadCocinaProducts();
    </script>

        <span class="material-symbols-outlined text-3xl">arrow_upward</span>
    </button>
    <script>
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('back-to-top');
            if (window.scrollY > 400) {
                btn.classList.remove('opacity-0', 'invisible');
                btn.classList.add('opacity-100', 'visible');
            } else {
                btn.classList.remove('opacity-100', 'visible');
                btn.classList.add('opacity-0', 'invisible');
            }
        });
    </script>
</body>

</html>
