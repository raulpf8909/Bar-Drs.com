name: Regenerate static menu pages
on:
  workflow_dispatch:
  repository_dispatch:
    types: [regenerate]

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Generate static HTML
        run: python3 generate_static.py
      - name: Commit changes
        run: |
          git config user.name "bot-regenerate"
          git config user.email "bot@bardrs.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "auto: regenerate static menu pages"
          git push
